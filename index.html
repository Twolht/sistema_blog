<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Foro Anderson Arias</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans:ital,opsz,wght@0,17..18,400..700;1,17..18,400..700&display=swap" rel="stylesheet">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <link href="./css/index.css" type="text/css" rel="stylesheet"/>
    <title>Document</title>
</head>
<body>
    <div id="app">
        <div class="tarjeta-formulario-datos" id="tarjeta-formulario-datos">
            <form class="content-form" id="form-datos-personales">
                <div class="content-title"><p>Para empezar, completa el formulario</p></div>
                <div class="content-text-nombre"><p>Nombre</p></div>
                <div class="content-input-nombre"><input id="input-nombre" type="text" placeholder="Digita nombre"/></div>
                <div class="content-text-apellido"><p>Apellido</p></div>
                <div class="content-input-apellido"><input id="input-apellido" type="text" placeholder="Digita apellido"/></div>
                <div class="content-button"><button name="comenzar" type="submit" id="comenzar">Comenzar</button></div>
            </form>
        </div>
    </div>
    <script type="module" src="./js/index.js"></script>
</body>
</html>
